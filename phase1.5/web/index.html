<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babylon Phase 1.5</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { color: #e53935; margin-bottom: 20px; font-size: 24px; }
input[type="text"] { width: 100%; padding: 12px 16px; background: #1a1a2e; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
input[type="text"]:focus { outline: none; border-color: #e53935; }
button { padding: 8px 16px; background: #e53935; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
button:hover { background: #c62828; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.secondary { background: #333; }
button.secondary:hover { background: #444; }
.result { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; gap: 12px; }
.result:hover { border-color: #e53935; }
.result img { width: 60px; height: 85px; object-fit: cover; border-radius: 4px; background: #333; }
.result-info { flex: 1; }
.result-title { font-weight: 600; margin-bottom: 4px; }
.result-meta { color: #888; font-size: 13px; }
.tag { display: inline-block; background: #2a2a3e; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-right: 4px; }
.episode-list { margin-top: 16px; }
.episode { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #111; border-radius: 6px; margin-bottom: 4px; }
.episode label { flex: 1; cursor: pointer; }
.episode input[type="checkbox"] { accent-color: #e53935; }
.controls { display: flex; gap: 8px; margin: 16px 0; align-items: center; }
.controls select { padding: 8px; background: #1a1a2e; color: #fff; border: 1px solid #333; border-radius: 6px; }
.progress-bar { width: 100%; height: 8px; background: #1a1a2e; border-radius: 4px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: #e53935; transition: width 0.3s; border-radius: 4px; }
.status { margin-top: 16px; padding: 12px; background: #1a1a2e; border-radius: 8px; font-size: 14px; }
.back { color: #888; cursor: pointer; margin-bottom: 12px; font-size: 14px; }
.back:hover { color: #fff; }
.loading { text-align: center; padding: 40px; color: #888; }
.select-all { margin-right: auto; }
#app { min-height: 60vh; }
.stream-url { font-size: 11px; color: #666; word-break: break-all; margin-top: 4px; }
</style>
</head>
<body>
<h1>BABYLON <span style="color:#888;font-weight:400;font-size:14px">Phase 1.5</span></h1>
<div id="app"></div>

<script>
const $ = document.querySelector.bind(document);
const app = $('#app');
let currentAnime = null;
let downloadJobId = null;

function render(html) { app.innerHTML = html; }

function searchView() {
  render(`
    <input type="text" id="search" placeholder="Search anime..." autofocus>
    <div id="results"></div>
  `);
  const input = $('#search');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => doSearch(input.value), 400);
  });
}

async function doSearch(q) {
  if (!q.trim()) { $('#results').innerHTML = ''; return; }
  $('#results').innerHTML = '<div class="loading">Searching...</div>';
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    $('#results').innerHTML = data.length === 0
      ? '<div class="loading">No results</div>'
      : data.map(r => `
        <div class="result" onclick="showEpisodes('${r.id}', '${esc(r.title)}')">
          ${r.cover_url ? `<img src="${r.cover_url}" alt="">` : '<div style="width:60px;height:85px;background:#333;border-radius:4px"></div>'}
          <div class="result-info">
            <div class="result-title">${esc(r.title)}</div>
            <div class="result-meta">
              ${r.year ? r.year + ' · ' : ''}${r.episode_count ? r.episode_count + ' eps · ' : ''}${r.status || ''}
            </div>
            <div style="margin-top:4px">
              ${r.languages.map(l => `<span class="tag">${l.toUpperCase()}</span>`).join('')}
              ${(r.genres||[]).slice(0,3).map(g => `<span class="tag">${g}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
  } catch(e) {
    $('#results').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

async function showEpisodes(id, title) {
  currentAnime = { id, title };
  render('<div class="loading">Loading episodes...</div>');
  try {
    const res = await fetch('/api/episodes?id=' + id);
    const eps = await res.json();
    if (eps.error) throw new Error(eps.error);
    render(`
      <div class="back" onclick="searchView()">&#8592; Back to search</div>
      <h2 style="margin-bottom:8px">${esc(title)}</h2>
      <div class="controls">
        <label class="select-all"><input type="checkbox" id="selectAll" onchange="toggleAll()"> Select all</label>
        <select id="lang"><option value="sub">SUB</option><option value="dub">DUB</option></select>
        <select id="quality"><option value="best">Best</option><option value="1080">1080p</option><option value="720">720p</option><option value="480">480p</option><option value="worst">Worst</option></select>
        <button onclick="downloadSelected()">Download Selected</button>
      </div>
      <div class="episode-list" id="epList">
        ${eps.map(ep => `
          <div class="episode">
            <input type="checkbox" class="ep-check" value="${ep.number}">
            <label>Episode ${ep.number}</label>
            <button class="secondary" onclick="getStreamUrl('${id}', ${ep.number}, event)">Stream URL</button>
          </div>
        `).join('')}
      </div>
      <div id="dlStatus"></div>
    `);
  } catch(e) {
    render('<div class="back" onclick="searchView()">&#8592; Back</div><div class="loading">Error: ' + e.message + '</div>');
  }
}

function toggleAll() {
  const checked = $('#selectAll').checked;
  document.querySelectorAll('.ep-check').forEach(cb => cb.checked = checked);
}

async function getStreamUrl(animeId, epNum, event) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '...';
  const lang = $('#lang')?.value || 'sub';
  const quality = $('#quality')?.value || 'best';
  try {
    const res = await fetch(`/api/stream?anime_id=${animeId}&ep=${epNum}&lang=${lang}&quality=${quality}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    // Copy to clipboard
    await navigator.clipboard.writeText(data.url);
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Stream URL'; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Stream URL'; btn.disabled = false; }, 2000);
  }
}

async function downloadSelected() {
  const checked = [...document.querySelectorAll('.ep-check:checked')].map(cb => parseFloat(cb.value));
  if (checked.length === 0) { alert('Select at least one episode'); return; }
  const lang = $('#lang')?.value || 'sub';
  const quality = $('#quality')?.value || 'best';
  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        anime_id: currentAnime.id,
        episodes: checked,
        lang, quality,
        title: currentAnime.title,
      }),
    });
    const data = await res.json();
    downloadJobId = data.job_id;
    pollDownload();
  } catch(e) {
    alert('Download failed: ' + e.message);
  }
}

async function pollDownload() {
  if (!downloadJobId) return;
  try {
    const res = await fetch('/api/download/status?job_id=' + downloadJobId);
    const job = await res.json();
    const pct = job.total > 0 ? Math.round((job.progress / job.total) * 100) : 0;
    const statusDiv = $('#dlStatus');
    if (statusDiv) {
      statusDiv.innerHTML = `
        <div class="status">
          <div><b>Download:</b> ${job.status} — ${job.progress}/${job.total} episodes${job.current ? ` (ep ${job.current})` : ''}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          ${job.errors.length > 0 ? '<div style="color:#e53935;margin-top:8px">Errors: ' + job.errors.join(', ') + '</div>' : ''}
          ${job.completed.length > 0 ? '<div style="color:#4caf50;margin-top:4px">Done: episodes ' + job.completed.join(', ') + '</div>' : ''}
        </div>
      `;
    }
    if (job.status !== 'complete') {
      setTimeout(pollDownload, 2000);
    }
  } catch(e) {}
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

searchView();
</script>
</body>
</html>
